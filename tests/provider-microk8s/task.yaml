summary: Run concierge with just a MicroK8s provider
systems:
  - ubuntu-*

execute: |
  pushd "${SPREAD_PATH}/${SPREAD_TASK}"

  # This test pins 1.31-strict/stable (see concierge.yaml). On that channel
  # two distinct upstream failures are currently known and accepted:
  #
  #   * 24.04 — microk8s#5394: install hangs indefinitely. `timeout` fires
  #     and exits 124.
  #   * 26.04 — microk8s 1.31-strict's install hook cannot start
  #     daemon-containerd, so concierge prepare exits 1 with the message
  #     "failed to install MicroK8s".
  #
  # We accept either failure mode and fail loudly if neither fires — that
  # would mean an upstream fix landed and the assertion block below should
  # be re-enabled.
  rc=0
  timeout 10m "$SPREAD_PATH"/concierge --trace prepare --extra-snaps="yq" 2> "$SPREAD_PATH/prepare.stderr" || rc=$?
  case $rc in
    124)
      echo "EXPECTED FAILURE: concierge prepare timed out (microk8s#5394)"
      exit 0
      ;;
    1)
      if grep -q "failed to install MicroK8s" "$SPREAD_PATH/prepare.stderr"; then
        echo "EXPECTED FAILURE: microk8s install hook failed (26.04 daemon-containerd)"
        exit 0
      fi
      echo "Concierge prepare failed with rc=1 but not from a known cause:"
      cat "$SPREAD_PATH/prepare.stderr"
      exit 1
      ;;
    0)
      echo "Concierge prepare SUCCEEDED — upstream microk8s#5394 or the 26.04 install"
      echo "issue appears fixed. Re-enable the assertion block in this test and"
      echo "remove the xfail wrapper."
      exit 1
      ;;
    *)
      echo "Concierge prepare failed with unexpected rc=$rc:"
      cat "$SPREAD_PATH/prepare.stderr"
      exit 1
      ;;
  esac

  list="$(snap list microk8s)"
  echo $list | MATCH microk8s
  echo $list | MATCH 1.31-strict/stable

  list="$(snap list)"
  echo $list | MATCH juju
  echo $list | MATCH kubectl

  sudo microk8s status --format yaml | yq '.addons[] | select(.name=="hostpath-storage") | .status'
  sudo microk8s status --format yaml | yq '.addons[] | select(.name=="dns") | .status'
  sudo microk8s status --format yaml | yq '.addons[] | select(.name=="metallb") | .status'

  kubectl config current-context | MATCH "microk8s"

  juju controllers | tail -n1 | MATCH concierge-microk8s
  juju models | tail -n1 | MATCH testing

restore: |
  if [[ -z "${CI:-}" ]]; then
    "$SPREAD_PATH"/concierge --trace restore
  fi
