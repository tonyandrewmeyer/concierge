juju:
  # The default 20-minute bootstrap timeout is too short for the controller
  # pod to expose its API on slow CI runners; pin a longer one so the
  # preset works out of the box on busy GHA hosts.
  extra-bootstrap-args: --config bootstrap-timeout=1800
  model-defaults:
    test-mode: "true"
    automatically-retry-hooks: "false"

providers:
  lxd:
    enable: true
  k8s:
    enable: true
    bootstrap: true
    bootstrap-constraints:
      root-disk: "2G"
    features:
      load-balancer:
        l2-mode: "true"
        cidrs: "10.43.45.0/28"
      local-storage: {}
      network: {}

host:
  packages:
    - gnome-keyring
    - python3-pip
    - python3-venv
  snaps:
    charmcraft:
    jq:
    yq:
    rockcraft:
