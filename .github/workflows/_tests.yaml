name: Tests

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      bases:
        # JSON array of {base, runner} entries. Each base is a spread system
        # label declared in spread.yaml; runner is the GHA runner label whose
        # OS matches that base (the github-ci backend is adhoc-on-localhost,
        # so the runner's OS must match the system label spread is asked for).
        required: true
        type: string

jobs:
  binaries:
    name: Build concierge
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Run tests
        run: |
          go test -v -race ./...

      - name: Setup goreleaser
        run: |
          sudo snap install --classic goreleaser

      - name: Build concierge
        id: build
        run: |
          goreleaser build --clean --snapshot --single-target --output .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOS: linux
          GOARCH: ${{ inputs.arch }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ inputs.arch }}
          path: ./concierge

  define-matrix:
    name: Define spread matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.suites.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Install
        run: |
          go install github.com/canonical/spread/cmd/spread@a3a44a96b6d00a72b0476756c70e3fb6610e7b48  # 2026-03-26

      - name: Generate matrix list
        id: suites
        env:
          ARCH: ${{ inputs.arch }}
          BASES: ${{ inputs.bases }}
        run: |
          # Enumerate suite names from a single system; the same suites apply
          # to every system declared on the github-ci backend, so the (system,
          # suite) cross-product is built here as a flat include list.
          list="$(spread -list github-ci:ubuntu-24.04 | sed "s|github-ci:ubuntu-24.04:tests/||g" | jq -r -ncR '[inputs | select(length>0)]')"
          case $ARCH in
            ppc64le|s390x)
              skip='{
                "preset-k8s": "Uses k8s snap.",
                "provider-k8s": "Uses k8s snap.",
                "preset-microk8s": "Uses microk8s snap.",
                "provider-microk8s": "Uses microk8s snap.",
                "juju-extra-bootstrap-args": "Uses microk8s snap.",
                "preset-dev": "Uses k8s and microk8s snaps.",
                "overrides-env": "Uses k8s and rockcraft snaps.",
                "provider-lxd-init-no-bootstrap": "Packs a charm (from charmcraft init) for only standard bases."
              }'
              echo "Skipping these tests:"
              echo $skip | jq
              list=$(echo "$list" | jq --compact-output --argjson skip "$skip" 'map(select(. as $item | $skip | has($item) | not))')
              ;;
            amd64)
              echo 'Standard architecture, using all tests.'
              ;;
            *)
              echo "Unknown architecture $ARCH, using all tests."
              ;;
          esac
          matrix=$(jq -c -n --argjson suites "$list" --argjson bases "$BASES" \
            '{include: [ $bases[] as $b | $suites[] | {suite: ., base: $b.base, runner: $b.runner} ]}')
          echo "matrix=$matrix"
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  spread-test:
    name: Spread (${{ matrix.suite }}, ${{ matrix.base }})
    runs-on: ${{ matrix.runner }}
    needs:
      - binaries
      - define-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: binary-${{ inputs.arch }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          architecture: ${{ inputs.arch }}

      - name: Install
        run: |
          go install github.com/canonical/spread/cmd/spread@a3a44a96b6d00a72b0476756c70e3fb6610e7b48  # 2026-03-26

      - name: Run integration tests
        env:
          SUITE: ${{ matrix.suite }}
          BASE: ${{ matrix.base }}
        run: |
          spread -v "github-ci:${BASE}:tests/${SUITE}"
